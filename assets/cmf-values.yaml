mountedVolumes:
  volumes:
    - name: mds-token
      secret:
        secretName: mds-token
    - name: tls-cmf
      secret:
        secretName: tls-cmf-full

  volumeMounts:
    - name: mds-token
      mountPath: /mount/mds
    - name: tls-cmf
      mountPath: /mount/tls